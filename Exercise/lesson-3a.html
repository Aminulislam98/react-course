<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React basic</title>
  </head>
  <body>
    <div id="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
      function Counter({ countNum, setCountNum }) {
        function countIncrease() {
          setCountNum(countNum + 1);
        }
        return (
          <div>
            <button onClick={countIncrease}>
              Clicked {countNum} {countNum <= 1 ? "time" : " times"}
            </button>
          </div>
        );
      }
      function App() {
        const [countNum, setCountNum] = React.useState(0);
        function reset() {
          setCountNum(0);
        }
        return (
          <div>
            <Counter countNum={countNum} setCountNum={setCountNum} />
            <Counter countNum={countNum} setCountNum={setCountNum} />
            <button onClick={reset}>Reset</button>
          </div>
        );
      }
      const container = document.getElementById("js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
